<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Last Ship — A World Forgotten</title>
  <!-- style.css owns the menu, story, loading, fonts, and base reset -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Loading ───────────────────────────────────────────── -->
  <div id="loading" aria-live="polite">
    <span id="loading-label">Loading…</span>
    <div id="loading-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100">
      <div id="loading-bar"></div>
    </div>
  </div>

  <!-- ── Main menu ─────────────────────────────────────────── -->
  <main id="main-menu" class="hidden" aria-label="Main menu">
    <canvas id="menu-grain" aria-hidden="true"></canvas>
    <header class="menu-title-area">
      <img class="menu-title" src="assets/title.png" alt="The Last Ship">
      <nav class="menu-nav" aria-label="Game menu">
        <button id="btn-play" class="btn-hero" type="button">
          <img src="assets/btn-start.png" alt="Start Game">
        </button>
      </nav>
    </header>
  </main>

  <!-- ── Story / context screens ───────────────────────────── -->
  <section id="story-screen" class="hidden" aria-label="Story introduction">
    <div class="story-card" aria-live="polite">
      <p id="story-text" class="story-text"></p>
      <nav class="story-nav" aria-label="Story navigation">
        <button id="btn-back" type="button">
          <img src="assets/btn-back.png" alt="Back">
        </button>
        <span id="story-counter" aria-hidden="true"></span>
        <button id="btn-next" type="button">
          <img src="assets/btn-next.png" alt="Next">
        </button>
      </nav>
    </div>
  </section>

  <!-- ── In-game UI ─────────────────────────────────────────── -->
  <p id="hint" role="status" aria-live="polite">
    WASD to move · Click to look
  </p>

  <!-- Virtual joystick (mobile) -->
  <div id="joystick-zone" aria-hidden="true">
    <div id="joystick-knob"></div>
  </div>

  <button id="talk-btn" type="button">Talk</button>

  <!-- ── Dialogue overlay ───────────────────────────────────── -->
  <div id="dialogue-box">
    <div id="dialogue-inner">
      <div id="dialogue-speaker"></div>
      <div id="dialogue-text"></div>
      <div id="dialogue-choices"></div>
      <div id="dialogue-free-wrap">
        <input id="dialogue-free-input" type="text"
               placeholder="Say something else…" maxlength="200" autocomplete="off" />
        <button id="dialogue-free-send">Ask</button>
      </div>
    </div>
  </div>

  <!-- ── Scripts ───────────────────────────────────────────── -->
  <script type="importmap">
  {
    "imports": {
      "three":         "https://unpkg.com/three@0.167.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.167.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'

    // ── Film grain ────────────────────────────────────────────────────────
    const grainCanvas = document.getElementById('menu-grain')
    const gctx = grainCanvas.getContext('2d')
    function drawGrain() {
      grainCanvas.width  = innerWidth
      grainCanvas.height = innerHeight
      const id = gctx.createImageData(innerWidth, innerHeight)
      const d  = id.data
      for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() * 255 | 0
        d[i]   = v
        d[i+1] = v * 0.15 | 0
        d[i+2] = v * 0.08 | 0
        d[i+3] = Math.random() * 38 | 0
      }
      gctx.putImageData(id, 0, 0)
    }
    drawGrain()

    // ── Renderer ──────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
    renderer.setSize(innerWidth, innerHeight)
    renderer.shadowMap.enabled = true
    renderer.shadowMap.type = THREE.PCFSoftShadowMap
    renderer.toneMapping = THREE.ACESFilmicToneMapping
    renderer.toneMappingExposure = 1.0
    renderer.outputColorSpace = THREE.SRGBColorSpace
    document.body.appendChild(renderer.domElement)

    // ── Scene ─────────────────────────────────────────────────────────────
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x100806)
    scene.fog = new THREE.Fog(0x100806, 22, 60)

    // ── Camera ────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 200)
    camera.position.set(0, 3, 6)

    // ── Lights ────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x331108, 1.0))
    const keyLight = new THREE.DirectionalLight(0xff4422, 1.8)
    keyLight.position.set(-8, 16, 6)
    keyLight.castShadow = true
    keyLight.shadow.mapSize.setScalar(1024)
    scene.add(keyLight)
    const rimLight = new THREE.DirectionalLight(0x220000, 0.6)
    rimLight.position.set(10, 4, -8)
    scene.add(rimLight)

    // ── Loaders ───────────────────────────────────────────────────────────
    const gltfLoader = new GLTFLoader()

    // ── Player ────────────────────────────────────────────────────────────
    const player = new THREE.Group()
    player.position.set(0, 0, 4)
    scene.add(player)

    gltfLoader.load('/assets/base.glb', (gltf) => {
      const model = gltf.scene
      player.add(model)
      player.updateMatrixWorld(true)
      const box = new THREE.Box3().setFromObject(player)
      const size = new THREE.Vector3()
      box.getSize(size)
      if (size.y > 0.01) {
        model.scale.setScalar(1.6 / size.y)
        player.updateMatrixWorld(true)
        const box2 = new THREE.Box3().setFromObject(player)
        model.position.y -= box2.min.y
      }
      model.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true } })
      console.log('[Player] base.glb loaded OK')
    }, undefined, (err) => {
      console.error('[Player] base.glb failed:', err)
      // fallback pill
      const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.3, 0.8, 4, 8),
        new THREE.MeshLambertMaterial({ color: 0x1a0a06 })
      )
      body.position.y = 0.7
      body.castShadow = true
      player.add(body)
    })

    // ── Floor raycaster ───────────────────────────────────────────────────
    const floorRay = new THREE.Raycaster()
    floorRay.far = 6
    let worldMeshes = []

    function snapPlayerToFloor() {
      if (worldMeshes.length === 0) { player.position.y = 0; return }
      floorRay.set(
        new THREE.Vector3(player.position.x, player.position.y + 3, player.position.z),
        new THREE.Vector3(0, -1, 0)
      )
      const hits = floorRay.intersectObjects(worldMeshes, false)
      if (hits.length > 0) player.position.y = hits[0].point.y
    }

    // ════════════════════════════════════════════════════════════════════
    // NPC DEFINITIONS
    // ════════════════════════════════════════════════════════════════════
    const NPC_DEFS = [
      {
        id: 'innkeeper',
        name: 'Mira',
        personality: `You are Mira, a tired but warm innkeeper in a medieval fantasy village.
You have run the Silver Hare inn for 20 years. You are pragmatic, slightly sarcastic,
and deeply loyal to regulars. You know local gossip. Speak in short, direct sentences.
Never break character.`,
        modelPath: '/assets/base.glb',
        spawnPosition: new THREE.Vector3(2, 0, -6),
        color: 0x8B6F47,
        script: {
          opening: {
            text: "You look like you've been walking for days. Hungry?",
            choices: [
              { id: 'hungry_yes', label: 'Starving, actually.' },
              { id: 'hungry_no',  label: "I'm fine. What's going on in town?" },
              { id: 'room',       label: 'I need a room for the night.' },
              { id: '__end__',    label: 'Just passing through.' },
            ]
          },
          responses: {
            hungry_yes: { text: "Stew's two copper. Sit down, I'll bring it over.", choices: [{ id:'pay', label:'Here, take it.' }, { id:'broke', label:"I don't have any coin." }, { id:'__end__', label:'Actually, I need to go.' }] },
            hungry_no:  { text: "Ha. Town's a mess. Old Rennick's mill burned three nights ago. Nobody knows why.", choices: [{ id:'mill_more', label:'A mill fire? Was anyone hurt?' }, { id:'rennick', label:'Who is Rennick?' }, { id:'__end__', label:'Interesting. Thanks.' }] },
            room:       { text: "Eight copper a night. Includes breakfast. I don't run a charity.", choices: [{ id:'take_room', label:"Deal. I'll take it." }, { id:'negotiate', label:'Can you do six?' }, { id:'__end__', label:'Too rich for me.' }] },
            pay:        { text: "Good. Don't spill it on my floor.", choices: [{ id:'__end__', label:"Wouldn't dream of it." }] },
            broke:      { text: "Then you're eating air. I'm not a charity.", choices: [{ id:'beg', label:"Please — I haven't eaten in two days." }, { id:'__end__', label:'Fair enough.' }] },
            beg:        { text: "...Fine. One bowl. You owe me.", choices: [{ id:'__end__', label:'Thank you. Truly.' }] },
            mill_more:  { text: "Old Harren lost two fingers trying to drag his grandson out. The boy's fine. Harren's not.", choices: [{ id:'cause', label:"What caused it?" }, { id:'__end__', label:'That sounds terrible.' }] },
            cause:      { text: "That's the question, isn't it. Some say lightning. I say lightning doesn't smell like sulfur.", choices: [{ id:'sulfur', label:'Sulfur? Like brimstone?' }, { id:'__end__', label:"I'll look into it." }] },
            sulfur:     { text: "Don't go looking into things you can't unlearn. That's my advice.", choices: [{ id:'__end__', label:'Noted.' }] },
            rennick:    { text: "Richest man in three villages. Owns half the farmland. Not well liked, but the mill keeps people fed.", choices: [{ id:'rennick_where', label:'Where does he live?' }, { id:'__end__', label:'I see. Thanks.' }] },
            rennick_where: { text: "Manor up the north road. Big iron gate. You can't miss it — or the guards.", choices: [{ id:'__end__', label:"I'll keep that in mind." }] },
            take_room:  { text: "Room three, top of the stairs. Key's on the hook. Breakfast at dawn.", choices: [{ id:'__end__', label:'Thank you, Mira.' }] },
            negotiate:  { text: "Seven, and that's my final word.", choices: [{ id:'take_room', label:"Alright. Seven it is." }, { id:'__end__', label:"No deal." }] },
          }
        }
      },
      {
        id: 'blacksmith',
        name: 'Gareth',
        personality: `You are Gareth, a young eager blacksmith apprentice.
You are proud of your work but insecure about your skills vs your master.
You love talking about metallurgy and weapons. Speak with enthusiasm.
Never break character.`,
        modelPath: '/assets/base.glb',
        spawnPosition: new THREE.Vector3(-6, 0, -8),
        color: 0x4a5a6a,
        script: {
          opening: {
            text: "Need a blade sharpened? I'm — well, the master's away, but I can handle it.",
            choices: [
              { id: 'sharpen', label: 'My sword could use some work.' },
              { id: 'master',  label: "Where's your master?" },
              { id: '__end__', label: "Just looking." },
            ]
          },
          responses: {
            sharpen:  { text: "Let me see it. ...This is fine steel. Where'd you get it?", choices: [{ id:'found_it', label:'Found it.' }, { id:'bought', label:'Bought it years ago.' }, { id:'__end__', label:"That's my business." }] },
            master:   { text: "He left two days ago. Said he had business in Thornwall. Hasn't come back.", choices: [{ id:'worried', label:"You seem worried." }, { id:'__end__', label:'I see. Good luck.' }] },
            worried:  { text: "He's always back by nightfall. Two days is... not normal for him.", choices: [{ id:'__end__', label:"I'll keep an eye out." }] },
            found_it: { text: "Huh. In a grave, or a fight?", choices: [{ id:'grave', label:'An old ruin, actually.' }, { id:'__end__', label:"Does it matter?" }] },
            grave:    { text: "Old ruins have good steel sometimes. Pre-war forging. They don't make them like that anymore.", choices: [{ id:'__end__', label:'Interesting.' }] },
            bought:   { text: "Good craft. Whoever made it knew what they were doing.", choices: [{ id:'__end__', label:'Thanks.' }] },
          }
        }
      }
    ]

    // ── Dialogue state ────────────────────────────────────────────────────
    let dialogueOpen    = false
    let activeNPC       = null
    let typewriterTimer = null
    let gameRunning     = false

    const dlgBox       = document.getElementById('dialogue-box')
    const dlgSpeaker   = document.getElementById('dialogue-speaker')
    const dlgText      = document.getElementById('dialogue-text')
    const dlgChoices   = document.getElementById('dialogue-choices')
    const dlgFreeWrap  = document.getElementById('dialogue-free-wrap')
    const dlgFreeInput = document.getElementById('dialogue-free-input')
    const dlgFreeSend  = document.getElementById('dialogue-free-send')
    const talkBtn      = document.getElementById('talk-btn')

    function showLine(speaker, text, choices) {
      dlgSpeaker.textContent = speaker
      dlgText.classList.remove('thinking')
      dlgChoices.innerHTML = ''
      dlgFreeWrap.style.display = 'none'
      if (typewriterTimer) clearInterval(typewriterTimer)
      dlgText.textContent = ''
      let i = 0
      typewriterTimer = setInterval(() => {
        dlgText.textContent += text[i++]
        if (i >= text.length) {
          clearInterval(typewriterTimer)
          typewriterTimer = null
          showChoices(choices)
        }
      }, 18)
    }

    function showChoices(choices) {
      dlgChoices.innerHTML = ''
      for (const c of (choices ?? [])) {
        const btn = document.createElement('button')
        btn.className   = 'choice-btn'
        btn.dataset.id  = c.id
        btn.textContent = c.label
        btn.addEventListener('click', () => handleChoice(c.id))
        dlgChoices.appendChild(btn)
      }
      dlgFreeWrap.style.display = 'flex'
    }

    function handleChoice(id) {
      if (!activeNPC) return
      if (id === '__end__') { closeDialogue(); return }
      const resp = activeNPC.script?.responses?.[id]
      if (resp) {
        showLine(activeNPC.name, resp.text, resp.choices)
      } else {
        askAI(id)
      }
    }

    async function askAI(playerText) {
      dlgText.classList.add('thinking')
      dlgChoices.innerHTML = ''
      dlgFreeWrap.style.display = 'none'
      try {
        const res = await fetch('/api/dialogue/ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            npcId:       activeNPC.id,
            npcName:     activeNPC.name,
            personality: activeNPC.personality,
            playerText,
            currentChoices: Object.keys(activeNPC.script?.responses ?? {}).map(id => ({ id })),
          })
        })
        if (!res.ok) throw new Error('bad response')
        const { matchedId, text, choices } = await res.json()
        if (matchedId) {
          const scripted = activeNPC.script?.responses?.[matchedId]
          if (scripted) { showLine(activeNPC.name, scripted.text, scripted.choices); return }
        }
        showLine(activeNPC.name, text, choices)
      } catch {
        showLine(activeNPC.name, '...', [{ id: '__end__', label: 'Leave.' }])
      }
    }

    function openDialogue(npcDef) {
      activeNPC    = npcDef
      dialogueOpen = true
      document.exitPointerLock?.()
      dlgBox.classList.add('open')
      talkBtn.classList.remove('visible')
      joystickZone.classList.remove('visible')
      resetKnob()
      const opening = npcDef.script?.opening ?? { text: 'Hello.', choices: [{ id:'__end__', label:'Goodbye.' }] }
      showLine(npcDef.name, opening.text, opening.choices)
    }

    function closeDialogue() {
      dialogueOpen = false
      activeNPC    = null
      if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null }
      dlgBox.classList.remove('open')
      dlgChoices.innerHTML = ''
      dlgText.textContent  = ''
      joystickZone.classList.add('visible')
    }

    // Free-text send
    const sendFree = () => {
      const t = dlgFreeInput.value.trim()
      if (!t) return
      dlgFreeInput.value = ''
      askAI(t)
    }
    dlgFreeSend.addEventListener('click', sendFree)
    dlgFreeInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendFree()
      e.stopPropagation()   // don't fire game keys while typing
    })
    dlgFreeInput.addEventListener('keyup',   e => e.stopPropagation())

    // ── Spawn NPCs ────────────────────────────────────────────────────────
    const npcs = []

    function buildPlaceholderNPC(color) {
      const g = new THREE.Group()
      const b = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1.0, 4, 8), new THREE.MeshLambertMaterial({ color }))
      b.position.y = 0.95; b.castShadow = true; g.add(b)
      const h = new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 6), new THREE.MeshLambertMaterial({ color: 0xd4a882 }))
      h.position.y = 1.9; g.add(h)
      return g
    }

    function buildPromptSprite(name) {
      const canvas = document.createElement('canvas')
      canvas.width = 256; canvas.height = 64
      const ctx = canvas.getContext('2d')
      ctx.fillStyle = 'rgba(0,0,0,0.65)'
      ctx.beginPath(); ctx.roundRect(4, 4, 248, 56, 8); ctx.fill()
      ctx.fillStyle = '#c8d8a0'
      ctx.font = '600 15px Georgia'
      ctx.textAlign = 'center'
      ctx.fillText(`[E]  Talk to ${name}`, 128, 36)
      const tex = new THREE.CanvasTexture(canvas)
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false })
      const sprite = new THREE.Sprite(mat)
      sprite.scale.set(2.2, 0.55, 1)
      sprite.position.set(0, 2.8, 0)
      sprite.visible = false
      return sprite
    }

    let spinTarget = null

    for (const def of NPC_DEFS) {
      const root = new THREE.Group()
      root.position.copy(def.spawnPosition)
      scene.add(root)
      const prompt = buildPromptSprite(def.name)
      root.add(prompt)
      const entry = { root, mixer: null, def, prompt }
      npcs.push(entry)
      gltfLoader.load(
        def.modelPath,
        (gltf) => {
          const model = gltf.scene
          model.position.set(0,0,0); model.rotation.set(0,0,0); model.scale.set(1,1,1)
          model.traverse(obj => {
            if (!obj.isMesh) return
            const s = obj.scale
            if (Math.abs(s.x - s.y) > 0.01 || Math.abs(s.y - s.z) > 0.01)
              obj.scale.setScalar(Math.max(s.x, s.y, s.z))
            obj.geometry.computeBoundingBox()
            const minY = obj.geometry.boundingBox.min.y * obj.scale.y + obj.position.y
            if (Math.abs(minY) > 0.01) obj.position.y -= minY
            obj.castShadow = true; obj.receiveShadow = true
            if (!obj.material || (Array.isArray(obj.material) && !obj.material.length))
              obj.material = new THREE.MeshLambertMaterial({ color: def.color })
          })
          root.add(model)
          if (gltf.animations?.length) {
            entry.mixer = new THREE.AnimationMixer(model)
            entry.mixer.clipAction(gltf.animations[0]).play()
          }
        },
        undefined,
        () => root.add(buildPlaceholderNPC(def.color))
      )
    }

    // ── World loading ─────────────────────────────────────────────────────
    function dismissLoading(cb) {
      const el = document.getElementById('loading')
      if (!el) { cb?.(); return }
      el.classList.add('hidden')
      setTimeout(() => { el.remove(); cb?.() }, 700)
    }

    function showMenu() {
      document.getElementById('main-menu').classList.remove('hidden')
    }

    // ── Story slides ──────────────────────────────────────────────────────
    const storySlides = [
      "It's the roaring 1950s in the island of Diécada. The European Democratic Kingdom is cracking down on their exports: sugar, bananas, slave labour, cocaine. Produce rots in sheds. Resentment boils in empty pots and empty stomachs.",
      "You are the last remaining EDK diplomat still operating. \n\nYou're hiding out in Diécada and you're not going back.",
      "Things are primed to reach an explosive point on August 30th, when the ships from the capital come in for their last harvest of blood fruit. \n\nThere are 3 days remaining.",
    ]

    let currentSlide = 0

    function renderSlide() {
      const text    = document.getElementById('story-text')
      const counter = document.getElementById('story-counter')
      const btnBack = document.getElementById('btn-back')
      text.classList.remove('visible')
      setTimeout(() => {
        text.innerText = storySlides[currentSlide]
        counter.textContent = `${currentSlide + 1} / ${storySlides.length}`
        btnBack.disabled = currentSlide === 0
        text.classList.add('visible')
      }, 600)
    }

    function showStory() {
      document.getElementById('main-menu').classList.add('hidden')
      const screen = document.getElementById('story-screen')
      screen.classList.remove('hidden')
      screen.classList.add('animate')
      renderSlide()
    }

    function enterGame() {
      document.getElementById('story-screen').classList.add('hidden')
      setTimeout(() => {
        document.getElementById('story-screen').remove()
        document.body.classList.add('game-active')
        document.getElementById('hint').style.display = 'block'
        showJoystick()
        gameRunning = true
      }, 600)
    }

    // ── Menu & story events ───────────────────────────────────────────────
    document.getElementById('btn-play').addEventListener('click', showStory)
    document.getElementById('btn-back').addEventListener('click', () => {
      if (currentSlide > 0) { currentSlide--; renderSlide() }
    })
    document.getElementById('btn-next').addEventListener('click', () => {
      if (currentSlide < storySlides.length - 1) {
        currentSlide++; renderSlide()
      } else {
        enterGame()
      }
    })

    // ── GLB load ──────────────────────────────────────────────────────────
    gltfLoader.load(
      '/assets/world.glb',
      (gltf) => {
        gltf.scene.traverse(o => {
          if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; worldMeshes.push(o) }
        })
        scene.add(gltf.scene)
        dismissLoading(showMenu)
      },
      (xhr) => {
        if (xhr.total) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100)
          document.getElementById('loading-bar').style.width = pct + '%'
          document.getElementById('loading-label').textContent = `Loading… ${pct}%`
        }
      },
      () => {
        console.info('No world.glb — using placeholder')
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshLambertMaterial({ color: 0x2d4a2d }))
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true
        scene.add(ground); worldMeshes.push(ground)
        scene.add(new THREE.GridHelper(40, 20, 0x3a5a3a, 0x3a5a3a))
        const cube = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshLambertMaterial({ color: 0xe05050 }))
        cube.position.set(0, 0.75, -8); cube.castShadow = true
        scene.add(cube); worldMeshes.push(cube); spinTarget = cube
        dismissLoading(showMenu)
      }
    )

    // ── Pointer lock ──────────────────────────────────────────────────────
    let mouseLocked = false
    renderer.domElement.addEventListener('click', () => {
      if (!mouseLocked && !dialogueOpen) renderer.domElement.requestPointerLock()
    })
    document.addEventListener('pointerlockchange', () => {
      mouseLocked = document.pointerLockElement === renderer.domElement
      document.getElementById('hint').textContent = mouseLocked
        ? 'WASD to move · Shift to release mouse'
        : 'WASD to move · Click canvas to look'
    })

    // ── Keyboard ──────────────────────────────────────────────────────────
    const keys = {}
    addEventListener('keydown', e => {
      if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight') && mouseLocked) document.exitPointerLock()
      if (e.code === 'KeyE' && !dialogueOpen) {
        for (const npc of npcs) {
          if (npc.prompt.visible) { openDialogue(npc.def); break }
        }
      }
      if (e.code === 'Escape' && dialogueOpen) closeDialogue()
      keys[e.code] = true
    })
    addEventListener('keyup', e => { keys[e.code] = false })

    // ── Virtual joystick (mobile) ─────────────────────────────────────────
    const joystickZone = document.getElementById('joystick-zone')
    const joystickKnob = document.getElementById('joystick-knob')
    const JOY_RADIUS   = 36   // max knob travel in px
    let   joyActive    = false
    let   joyId        = null
    let   joyOriginX   = 0, joyOriginY = 0
    let   joyDx        = 0, joyDy      = 0   // normalised −1..1

    function showJoystick() {
      joystickZone.classList.add('visible')
    }

    function getZoneCenter() {
      const rect = joystickZone.getBoundingClientRect()
      return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 }
    }

    // Touch events
    joystickZone.addEventListener('touchstart', e => {
      e.preventDefault()
      if (joyActive) return
      const t    = e.changedTouches[0]
      joyActive  = true
      joyId      = t.identifier
      const c    = getZoneCenter()
      joyOriginX = c.x; joyOriginY = c.y
      updateKnob(t.clientX, t.clientY)
    }, { passive: false })

    joystickZone.addEventListener('touchmove', e => {
      e.preventDefault()
      for (const t of e.changedTouches) {
        if (t.identifier === joyId) { updateKnob(t.clientX, t.clientY); break }
      }
    }, { passive: false })

    joystickZone.addEventListener('touchend', e => {
      for (const t of e.changedTouches) {
        if (t.identifier === joyId) { resetKnob(); break }
      }
    })
    joystickZone.addEventListener('touchcancel', resetKnob)

    // Mouse events (desktop)
    joystickZone.addEventListener('mousedown', e => {
      e.preventDefault()
      e.stopPropagation()   // prevent canvas pointer-lock from firing
      joyActive  = true
      const c    = getZoneCenter()
      joyOriginX = c.x; joyOriginY = c.y
      updateKnob(e.clientX, e.clientY)
      window.addEventListener('mousemove', onJoyMouseMove)
      window.addEventListener('mouseup',   onJoyMouseUp)
    })

    function onJoyMouseMove(e) {
      if (!joyActive) return
      updateKnob(e.clientX, e.clientY)
    }

    function onJoyMouseUp() {
      resetKnob()
      window.removeEventListener('mousemove', onJoyMouseMove)
      window.removeEventListener('mouseup',   onJoyMouseUp)
    }

    function updateKnob(cx, cy) {
      let dx = cx - joyOriginX
      let dy = cy - joyOriginY
      const dist = Math.sqrt(dx * dx + dy * dy)
      if (dist > JOY_RADIUS) { dx = dx / dist * JOY_RADIUS; dy = dy / dist * JOY_RADIUS }
      joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`
      joyDx = dx / JOY_RADIUS
      joyDy = dy / JOY_RADIUS
    }

    function resetKnob() {
      joyActive = false
      joyId     = null
      joyDx     = 0
      joyDy     = 0
      joystickKnob.style.transform = 'translate(0px, 0px)'
    }

    // ── Talk button (mobile) ──────────────────────────────────────────────
    talkBtn.addEventListener('click', () => {
      for (const npc of npcs) {
        if (npc.prompt.visible) { openDialogue(npc.def); break }
      }
    })

    // ── Game loop ─────────────────────────────────────────────────────────
    const clock = new THREE.Clock()
    const SPEED = 5
    const INTERACT_DIST = 3.0
    let yaw = 0, pitch = 0

    renderer.setAnimationLoop(() => {
      const dt = Math.min(clock.getDelta(), 0.1)
      if (spinTarget) spinTarget.rotation.y += dt * 0.8
      if (!gameRunning) { renderer.render(scene, camera); return }

      // NPC proximity
      let anyNearby = false
      for (const npc of npcs) {
        const dir = player.position.clone().sub(npc.root.position)
        dir.y = 0
        if (dir.lengthSq() > 0.01)
          npc.root.rotation.y += (Math.atan2(dir.x, dir.z) - npc.root.rotation.y) * 0.05
        if (npc.mixer) npc.mixer.update(dt)
        const dist = player.position.distanceTo(npc.root.position)
        const nearby = dist < INTERACT_DIST && !dialogueOpen
        npc.prompt.visible = nearby
        if (nearby) anyNearby = true
      }
      talkBtn.classList.toggle('visible', anyNearby && !dialogueOpen)

      if (dialogueOpen) { renderer.render(scene, camera); return }

      // Movement (keyboard + joystick)
      let mx = 0, mz = 0
      if (keys['KeyW']  || keys['ArrowUp'])    mz -= 1
      if (keys['KeyS']  || keys['ArrowDown'])  mz += 1
      if (keys['KeyA']  || keys['ArrowLeft'])  mx -= 1
      if (keys['KeyD']  || keys['ArrowRight']) mx += 1
      // Virtual joystick overrides keyboard when active
      if (joyActive) { mx = joyDx; mz = joyDy }
      const len = Math.sqrt(mx * mx + mz * mz)
      if (len > 1) { mx /= len; mz /= len }

      const fwd   = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw))
      const right = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw))

      const PLAYER_RADIUS = 0.5
      const wallRay  = new THREE.Raycaster()
      const chestPos = player.position.clone().add(new THREE.Vector3(0, 1, 0))
      const collidables = [...worldMeshes]
      for (const npc of npcs) npc.root.traverse(o => { if (o.isMesh) collidables.push(o) })

      if (mz !== 0 && collidables.length > 0) {
        const dir = fwd.clone().multiplyScalar(-mz).normalize()
        wallRay.set(chestPos, dir); wallRay.far = PLAYER_RADIUS
        if (wallRay.intersectObjects(collidables, false).length > 0) mz = 0
      }
      if (mx !== 0 && collidables.length > 0) {
        const dir = right.clone().multiplyScalar(mx).normalize()
        wallRay.set(chestPos, dir); wallRay.far = PLAYER_RADIUS
        if (wallRay.intersectObjects(collidables, false).length > 0) mx = 0
      }

      player.position.addScaledVector(fwd,  -mz * SPEED * dt)
      player.position.addScaledVector(right, mx * SPEED * dt)
      snapPlayerToFloor()

      if (mx !== 0 || mz !== 0) {
        const angle = Math.atan2(fwd.x * (-mz) + right.x * mx, fwd.z * (-mz) + right.z * mx)
        player.rotation.y += (angle - player.rotation.y) * 0.2
      }

      // Camera
      const camDist = 5, camH = 2.5
      const offset = new THREE.Vector3(
        Math.sin(yaw) * Math.cos(pitch) * camDist,
        Math.sin(pitch) * camDist + camH,
        Math.cos(yaw) * Math.cos(pitch) * camDist
      )
      const lookAt = player.position.clone().add(new THREE.Vector3(0, 1, 0))
      camera.position.lerp(lookAt.clone().add(offset), 0.15)
      camera.lookAt(lookAt)
      renderer.render(scene, camera)
    })

    // ── Mouse look ────────────────────────────────────────────────────────
    addEventListener('mousemove', e => {
      if (!mouseLocked) return
      yaw   -= e.movementX * 0.002
      pitch -= e.movementY * 0.002
      pitch  = Math.max(-0.5, Math.min(0.4, pitch))
    })

    // ── Resize ────────────────────────────────────────────────────────────
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(innerWidth, innerHeight)
      drawGrain()
    })
  </script>
</body>
</html>
