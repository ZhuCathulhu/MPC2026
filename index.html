<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPC2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }

    #hint {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #aaa;
      font: 13px/1.5 monospace; padding: 7px 16px; border-radius: 20px;
      pointer-events: none; text-align: center; white-space: nowrap;
    }

    #joystick-zone {
      position: fixed; bottom: 30px; left: 30px;
      width: 110px; height: 110px;
      touch-action: none; z-index: 10;
    }

    #loading {
      position: fixed; inset: 0; background: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      color: #666; font: 13px/1 monospace;
      transition: opacity 0.6s; z-index: 100;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading-bar-wrap { width: 200px; height: 2px; background: #222; border-radius: 1px; overflow: hidden; }
    #loading-bar { height: 100%; background: #666; width: 0%; transition: width 0.2s; }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-label">loading…</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>

  <div id="hint">WASD to move · Click canvas to look</div>
  <div id="joystick-zone"></div>

  <script type="importmap">
  {
    "imports": {
      "three":         "https://unpkg.com/three@0.167.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.167.0/examples/jsm/",
      "nipplejs":      "https://unpkg.com/nipplejs@0.10.1/dist/nipplejs.mjs"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'
    import nipplejs from 'nipplejs'

    const gltfLoader = new GLTFLoader()

    // ── Renderer ──────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
    renderer.setSize(innerWidth, innerHeight)
    renderer.shadowMap.enabled = true
    renderer.shadowMap.type = THREE.PCFSoftShadowMap
    renderer.toneMapping = THREE.ACESFilmicToneMapping
    renderer.toneMappingExposure = 1.0
    renderer.outputColorSpace = THREE.SRGBColorSpace
    document.body.appendChild(renderer.domElement)

    // ── Scene ─────────────────────────────────────────────────────────────
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x1a1a2e)
    scene.fog = new THREE.Fog(0x1a1a2e, 25, 65)

    // ── Camera ────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 200)
    camera.position.set(0, 3, 6)

    // ── Lights ────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6))
    const sun = new THREE.DirectionalLight(0xffeedd, 2)
    sun.position.set(10, 20, 10)
    sun.castShadow = true
    sun.shadow.mapSize.setScalar(1024)
    scene.add(sun)

    // ── Player ────────────────────────────────────────────────────────────
    const player = new THREE.Group()
    const body = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.3, 0.8, 4, 8),
      new THREE.MeshLambertMaterial({ color: 0x88aaff })
    )
    body.position.y = 0.7
    body.castShadow = true
    player.add(body)
    const eye = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 6, 6),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    )
    eye.position.set(0, 1.1, -0.28)
    player.add(eye)
    player.position.set(0, 0, 4)
    scene.add(player)

    // ── Collision raycaster ───────────────────────────────────────────────
    // Shoots straight down from above the player every frame.
    // worldMeshes is populated once the world GLB loads.
    const floorRay = new THREE.Raycaster()
    floorRay.far = 6          // only look 6 units below origin point
    let worldMeshes = []      // flat list of Mesh objects to test against

    function snapPlayerToFloor() {
      if (worldMeshes.length === 0) {
        player.position.y = 0
        return
      }
      // Cast from 3 units above the player's feet downward
      floorRay.set(
        new THREE.Vector3(player.position.x, player.position.y + 3, player.position.z),
        new THREE.Vector3(0, -1, 0)
      )
      const hits = floorRay.intersectObjects(worldMeshes, false)
      if (hits.length > 0) {
        player.position.y = hits[0].point.y
      } else {
        // No floor found — hold last Y so the player doesn't fall through
        // (you can change this to gravity if you want falling)
      }
    }

    // ── NPC definitions ───────────────────────────────────────────────────
    const NPC_DEFS = [
      {
        name: 'Mira',
        modelPath: '/assets/innkeeper.glb',
        spawnPosition: new THREE.Vector3(2, 0, -6),
        color: 0x8B6F47,
      },
      {
        name: 'Gareth',
        modelPath: '/assets/gareth.glb',
        spawnPosition: new THREE.Vector3(-6, 0, -8),
        color: 0x4a5a6a,
      },
    ]

    // ── Spawn NPCs ────────────────────────────────────────────────────────
    const npcs = []

    function buildPlaceholderNPC(color) {
      const g = new THREE.Group()
      g.add(Object.assign(
        new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1.0, 4, 8), new THREE.MeshLambertMaterial({ color })),
        { position: { y: 0.95 }, castShadow: true }
      ))
      g.add(Object.assign(
        new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 6), new THREE.MeshLambertMaterial({ color: 0xd4a882 })),
        { position: { y: 1.9 } }
      ))
      return g
    }

    for (const def of NPC_DEFS) {
      const root = new THREE.Group()
      root.position.copy(def.spawnPosition)
      scene.add(root)

      const entry = { root, mixer: null, name: def.name }
      npcs.push(entry)

      gltfLoader.load(
        def.modelPath,
        (gltf) => {
          const model = gltf.scene
          model.position.set(0, 0, 0)
          model.rotation.set(0, 0, 0)
          model.scale.set(1, 1, 1)
          model.traverse(obj => {
            if (!obj.isMesh) return
            const s = obj.scale
            if (Math.abs(s.x - s.y) > 0.01 || Math.abs(s.y - s.z) > 0.01)
              obj.scale.setScalar(Math.max(s.x, s.y, s.z))
            obj.geometry.computeBoundingBox()
            const minY = obj.geometry.boundingBox.min.y * obj.scale.y + obj.position.y
            if (Math.abs(minY) > 0.01) obj.position.y -= minY
            obj.castShadow = true
            obj.receiveShadow = true
            if (!obj.material || (Array.isArray(obj.material) && !obj.material.length))
              obj.material = new THREE.MeshLambertMaterial({ color: def.color })
          })
          root.add(model)
          if (gltf.animations && gltf.animations.length) {
            entry.mixer = new THREE.AnimationMixer(model)
            entry.mixer.clipAction(gltf.animations[0]).play()
          }
        },
        undefined,
        () => root.add(buildPlaceholderNPC(def.color))
      )
    }

    // ── World loading ─────────────────────────────────────────────────────
    function dismissLoading() {
      const el = document.getElementById('loading')
      if (!el) return
      el.classList.add('hidden')
      setTimeout(() => el.remove(), 700)
    }

    let spinTarget = null

    gltfLoader.load(
      '/assets/world.glb',
      (gltf) => {
        gltf.scene.traverse(o => {
          if (o.isMesh) {
            o.castShadow = true
            o.receiveShadow = true
            worldMeshes.push(o)   // ← collect every mesh for raycasting
          }
        })
        scene.add(gltf.scene)
        dismissLoading()
      },
      (xhr) => {
        if (xhr.total) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100)
          document.getElementById('loading-bar').style.width = pct + '%'
          document.getElementById('loading-label').textContent = `loading world… ${pct}%`
        }
      },
      () => {
        // No world.glb — build placeholder and register its meshes
        console.info('No world.glb — using placeholder')
        const ground = new THREE.Mesh(
          new THREE.PlaneGeometry(40, 40),
          new THREE.MeshLambertMaterial({ color: 0x2d4a2d })
        )
        ground.rotation.x = -Math.PI / 2
        ground.receiveShadow = true
        scene.add(ground)
        worldMeshes.push(ground)   // ← register placeholder ground

        scene.add(new THREE.GridHelper(40, 20, 0x3a5a3a, 0x3a5a3a))

        const cube = new THREE.Mesh(
          new THREE.BoxGeometry(1.5, 1.5, 1.5),
          new THREE.MeshLambertMaterial({ color: 0xe05050 })
        )
        cube.position.set(0, 0.75, -8)
        cube.castShadow = true
        scene.add(cube)
        worldMeshes.push(cube)     // ← register cube too (player can walk on top)
        spinTarget = cube
        dismissLoading()
      }
    )

    // ── Pointer lock ──────────────────────────────────────────────────────
    let mouseLocked = false
    renderer.domElement.addEventListener('click', () => {
      if (!mouseLocked) renderer.domElement.requestPointerLock()
    })
    document.addEventListener('pointerlockchange', () => {
      mouseLocked = document.pointerLockElement === renderer.domElement
      document.getElementById('hint').textContent = mouseLocked
        ? 'WASD to move · Shift to release mouse'
        : 'WASD to move · Click canvas to look'
    })
    addEventListener('keydown', e => {
      if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight') && mouseLocked)
        document.exitPointerLock()
    })

    // ── Mouse look ────────────────────────────────────────────────────────
    let yaw = 0, pitch = 0
    addEventListener('mousemove', e => {
      if (!mouseLocked) return
      yaw   -= e.movementX * 0.002
      pitch -= e.movementY * 0.002
      pitch  = Math.max(-0.5, Math.min(0.4, pitch))
    })

    // ── Keyboard ──────────────────────────────────────────────────────────
    const keys = {}
    addEventListener('keydown', e => { keys[e.code] = true })
    addEventListener('keyup',   e => { keys[e.code] = false })

    // ── Joystick ──────────────────────────────────────────────────────────
    let joyX = 0, joyZ = 0
    const manager = nipplejs.create({
      zone: document.getElementById('joystick-zone'),
      mode: 'static', position: { left: '50%', top: '50%' },
      color: 'rgba(140,160,255,0.5)', size: 100,
    })
    manager.on('move', (_, d) => { joyX = d.vector?.x ?? 0; joyZ = -(d.vector?.y ?? 0) })
    manager.on('end',  ()     => { joyX = 0; joyZ = 0 })

    // ── Game loop ─────────────────────────────────────────────────────────
    const clock = new THREE.Clock()
    const SPEED = 5

    renderer.setAnimationLoop(() => {
      const dt = Math.min(clock.getDelta(), 0.1)

      if (spinTarget) spinTarget.rotation.y += dt * 0.8

      // NPC: face player + tick animations
      for (const npc of npcs) {
        const dir = player.position.clone().sub(npc.root.position)
        dir.y = 0
        if (dir.lengthSq() > 0.01)
          npc.root.rotation.y += (Math.atan2(dir.x, dir.z) - npc.root.rotation.y) * 0.05
        if (npc.mixer) npc.mixer.update(dt)
      }

      // Movement
      let mx = joyX, mz = joyZ
      if (keys['KeyW']  || keys['ArrowUp'])    mz -= 1
      if (keys['KeyS']  || keys['ArrowDown'])  mz += 1
      if (keys['KeyA']  || keys['ArrowLeft'])  mx -= 1
      if (keys['KeyD']  || keys['ArrowRight']) mx += 1
      const len = Math.sqrt(mx * mx + mz * mz)
      if (len > 1) { mx /= len; mz /= len }

      const fwd   = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw))
      const right = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw))

      // ── Wall collision ───────────────────────────────────────────────────
      // Before moving, cast a ray in the intended direction at chest height.
      // If a wall is within PLAYER_RADIUS, cancel that axis of movement.
      const PLAYER_RADIUS = 0.5
      const wallRay = new THREE.Raycaster()
      const chestPos = player.position.clone().add(new THREE.Vector3(0, 1, 0))

      if (mz !== 0 && worldMeshes.length > 0) {
        const dir = fwd.clone().multiplyScalar(-mz).normalize()
        wallRay.set(chestPos, dir)
        wallRay.far = PLAYER_RADIUS
        if (wallRay.intersectObjects(worldMeshes, false).length > 0) mz = 0
      }
      if (mx !== 0 && worldMeshes.length > 0) {
        const dir = right.clone().multiplyScalar(mx).normalize()
        wallRay.set(chestPos, dir)
        wallRay.far = PLAYER_RADIUS
        if (wallRay.intersectObjects(worldMeshes, false).length > 0) mx = 0
      }

      player.position.addScaledVector(fwd,  -mz * SPEED * dt)
      player.position.addScaledVector(right, mx * SPEED * dt)

      // ── Floor collision (replaces hard player.position.y = 0) ───────────
      snapPlayerToFloor()

      if (mx !== 0 || mz !== 0) {
        const angle = Math.atan2(
          fwd.x * (-mz) + right.x * mx,
          fwd.z * (-mz) + right.z * mx
        )
        player.rotation.y += (angle - player.rotation.y) * 0.2
      }

      // Camera
      const camDist = 5, camH = 2.5
      const offset = new THREE.Vector3(
        Math.sin(yaw) * Math.cos(pitch) * camDist,
        Math.sin(pitch) * camDist + camH,
        Math.cos(yaw) * Math.cos(pitch) * camDist
      )
      const lookAt = player.position.clone().add(new THREE.Vector3(0, 1, 0))
      camera.position.lerp(lookAt.clone().add(offset), 0.15)
      camera.lookAt(lookAt)

      renderer.render(scene, camera)
    })

    // ── Resize ────────────────────────────────────────────────────────────
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(innerWidth, innerHeight)
    })
  </script>
</body>
</html>
